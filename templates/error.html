<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Error</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="shortcut icon" href="/static/favicon.ico">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;color:#fff;
  display:flex;align-items:center;justify-content:center;
  padding:20px 16px;-webkit-font-smoothing:antialiased;
}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:32px 20px;
  text-align:center;
  max-width:340px;width:100%;
}
.icon{font-size:44px;margin-bottom:16px}
h1{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.4}
p{color:#94a3b8;font-size:13px;line-height:1.5}
.back-link{
  display:inline-block;margin-top:16px;
  padding:10px 24px;border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#a78bfa;text-decoration:none;
  font-size:13px;font-weight:600;
  -webkit-tap-highlight-color:transparent;
}
.back-link:active{background:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚠️</div>
  <h1>{{ message }}</h1>
  <p>Silakan kembali ke Telegram Bot Anda.</p>
  <a class="back-link" href="https://t.me/openflaredevbot">🤖 Buka Bot</a>
</div>
</body>
</html>

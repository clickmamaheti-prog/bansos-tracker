<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Colors -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg-grad)" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Green Leaves (3 blades) -->
  <!-- Bottom blade -->
  <path d="M 88 112 Q 120 90 160 105 L 150 115 Q 115 108 88 122 Z" fill="#00A550"/>
  <path d="M 88 112 Q 120 90 160 105" fill="none" stroke="#008840" stroke-width="0.5"/>
  <!-- Middle blade -->
  <path d="M 86 102 Q 115 72 150 80 L 140 92 Q 110 86 86 112 Z" fill="#00A550"/>
  <path d="M 86 102 Q 115 72 150 80" fill="none" stroke="#008840" stroke-width="0.5"/>
  <!-- Top blade -->
  <path d="M 82 92 Q 108 55 140 55 L 130 68 Q 105 72 82 102 Z" fill="#00A550"/>
  <path d="M 82 92 Q 108 55 140 55" fill="none" stroke="#008840" stroke-width="0.5"/>

  <!-- Yellow Base Bowl -->
  <path d="M 55 130 Q 100 175 145 130 L 152 138 Q 100 185 48 138 Z" fill="#FFCC00"/>
  
  <!-- Yellow inner ridges (3 lines) -->
  <path d="M 62 137 Q 100 168 138 137" fill="none" stroke="#E6B800" stroke-width="2.5"/>
  <path d="M 70 144 Q 100 172 130 144" fill="none" stroke="#E6B800" stroke-width="2.5"/>
  <path d="M 78 151 Q 100 176 122 151" fill="none" stroke="#E6B800" stroke-width="2.5"/>

  <!-- Blue Human Figure -->
  <!-- Head -->
  <circle cx="70" cy="58" r="16" fill="#0055A4"/>
  
  <!-- Body - V shape reaching up -->
  <path d="M 70 73 
           C 58 92 45 110 38 118 
           L 44 122 
           C 55 108 65 92 70 78 
           C 78 62 88 50 96 42 
           L 90 36 
           C 80 46 68 62 70 73 Z" fill="#0055A4"/>
</svg>
